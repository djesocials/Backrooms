<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms - Full Stealth Build</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #d0ca8d; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transition: opacity 0.1s; background: radial-gradient(circle, transparent 20%, rgba(200,0,0,0.8) 120%); opacity: 0; z-index: 5; }

        #blocker { position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; pointer-events: auto; z-index: 30; }
        #instructions { font-size: 20px; cursor: pointer; text-align: center; max-width: 600px; padding: 20px; border: 1px solid #ccaa00; background: rgba(20,20,0,0.5); }
        .glitch { font-size: 40px; color: #ccaa00; font-weight: bold; text-shadow: 2px 2px #ff0000, -2px -2px #0000ff; animation: glitch 1s infinite linear; }
        
        #hud { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 24px; text-shadow: 2px 2px 0 #000; display: none; z-index: 10; }
        #rec { position: absolute; top: 20px; right: 30px; color: red; font-size: 24px; font-weight: bold; animation: blink 1s infinite; display: none; z-index: 10; }
        
        #jumpscare { display: none; position: absolute; width: 100%; height: 100%; z-index: 50; flex-direction: column; align-items: center; justify-content: center; background-color: #000; color: #fff; font-size: 120px; font-weight: bold; text-align: center; text-shadow: 5px 5px 0 #f00, -5px -5px 0 #00f; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes glitch { 
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
    </style>
</head>
<body>
    <div id="vignette"></div>
    <div id="jumpscare">CAUGHT</div>
    <div id="ui-layer">
        <div id="hud">LEVEL: <span id="level-text">1</span></div>
        <div id="rec">● REC</div>
    </div>
    
    <div id="blocker">
        <div id="instructions">
            <p class="glitch">THE BACKROOMS</p>
            <p>Find the green exit. If the screen turns red, RUN.</p>
            <p>Break Line-of-Sight to lose it.</p>
            <hr style="border-color: #555;">
            <p>WASD = Move | Mouse = Look | SHIFT = Sprint</p>
            <p style="color: #0f0; font-weight: bold;">[ CLICK TO ENTER ]</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // --- 1. CORE SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd0ca8d); 
        scene.fog = new THREE.FogExp2(0xd0ca8d, 0.02); 

        // HIGH FOV FOR FISHEYE EFFECT
        const camera = new THREE.PerspectiveCamera(110, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.y = 1.6;

        const renderer = new THREE.WebGLRenderer({ powerPreference: "high-performance", antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. AUDIO ENGINE ---
        let audioCtx;
        let humOscillator, humGain;

        function initAudio() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            humOscillator = audioCtx.createOscillator();
            humOscillator.type = 'sawtooth';
            humOscillator.frequency.value = 60; 
            
            humGain = audioCtx.createGain();
            humGain.gain.value = 0.08; 
            
            const lowpass = audioCtx.createBiquadFilter();
            lowpass.type = 'lowpass';
            lowpass.frequency.value = 250;

            humOscillator.connect(lowpass).connect(humGain).connect(audioCtx.destination);
            humOscillator.start();
        }

        function playJumpscare() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            osc.connect(gainNode).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        // --- 3. CONTROLS ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        const instructions = document.getElementById('instructions');
        const hud = document.getElementById('hud');
        const rec = document.getElementById('rec');

        instructions.addEventListener('click', () => {
            initAudio();
            controls.lock();
        });

        controls.addEventListener('lock', () => {
            blocker.style.display = 'none';
            hud.style.display = 'block';
            rec.style.display = 'block';
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        });

        controls.addEventListener('unlock', () => {
            if(!isDead) blocker.style.display = 'flex';
            hud.style.display = 'none';
            rec.style.display = 'none';
            if(audioCtx) audioCtx.suspend();
        });

        const moveState = { forward: false, backward: false, left: false, right: false, sprint: false };
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyD': moveState.right = true; break;
                case 'ShiftLeft': moveState.sprint = true; break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyD': moveState.right = false; break;
                case 'ShiftLeft': moveState.sprint = false; break;
            }
        });

        // --- 4. PROCEDURAL TEXTURES ---
        function createWallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#cfb974'; ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#b8a158'; ctx.lineWidth = 6;
            for(let i = 16; i < 256; i += 64) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 256); ctx.stroke();
                for(let j = 32; j < 256; j += 64) {
                    ctx.beginPath(); ctx.moveTo(i, j); ctx.lineTo(i+10, j+15); ctx.lineTo(i, j+30); ctx.lineTo(i-10, j+15); ctx.fill();
                }
            }
            for(let i=0; i<5000; i++) {
                ctx.fillStyle = `rgba(100, 80, 0, ${Math.random() * 0.05})`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(2, 2); 
            return tex;
        }

        function createCeilingTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e8e8e8'; ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#aaaaaa'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, 256, 256);
            for(let i=0; i<8000; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.1})`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(15, 15);
            return tex;
        }

        function createCarpetTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#a89456'; ctx.fillRect(0, 0, 256, 256);
            for(let i=0; i<30000; i++) {
                ctx.fillStyle = `rgba(50, 40, 10, ${Math.random() * 0.15})`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 1, 1);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(10, 10);
            return tex;
        }

        const wallMat = new THREE.MeshLambertMaterial({ map: createWallTexture() }); 
        const floorMat = new THREE.MeshLambertMaterial({ map: createCarpetTexture() }); 
        const ceilingMat = new THREE.MeshLambertMaterial({ map: createCeilingTexture() }); 

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), ceilingMat);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 3;
        scene.add(ceiling);

        // --- 5. GAME LOGIC & MAZE GENERATION ---
        let currentLevel = 1;
        let mapSize = 25; 
        const wallSize = 3;
        let walls = [];
        let wallMesh; 
        
        const exitGeo = new THREE.BoxGeometry(wallSize, 3, wallSize);
        const exitMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 });
        const exitBlock = new THREE.Mesh(exitGeo, exitMat);
        const exitLight = new THREE.PointLight(0x00ff00, 1, 15);
        exitBlock.add(exitLight);
        scene.add(exitBlock);

        const monsterGeo = new THREE.BoxGeometry(1.2, 2.5, 1.2);
        const monsterMat = new THREE.MeshBasicMaterial({ color: 0x050505 }); 
        const monster = new THREE.Mesh(monsterGeo, monsterMat);
        scene.add(monster);

        // AI Variables
        let monsterTarget = new THREE.Vector3();
        let isChasing = false;
        const raycaster = new THREE.Raycaster();

        function generateLevel() {
            walls = [];
            if (wallMesh) scene.remove(wallMesh);

            camera.position.set(0, 1.6, 0);

            const wallGeo = new THREE.BoxGeometry(wallSize, 3, wallSize);
            wallMesh = new THREE.InstancedMesh(wallGeo, wallMat, mapSize * mapSize);
            let instanceId = 0;
            const dummy = new THREE.Object3D();

            for(let x = -mapSize/2; x < mapSize/2; x++) {
                for(let z = -mapSize/2; z < mapSize/2; z++) {
                    if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;

                    if(Math.random() > 0.65) {
                        const worldX = x * wallSize;
                        const worldZ = z * wallSize;

                        dummy.position.set(worldX, 1.5, worldZ);
                        dummy.updateMatrix();
                        wallMesh.setMatrixAt(instanceId++, dummy.matrix);
                        
                        walls.push({
                            minX: worldX - (wallSize / 2),
                            maxX: worldX + (wallSize / 2),
                            minZ: worldZ - (wallSize / 2),
                            maxZ: worldZ + (wallSize / 2)
                        });
                    }
                }
            }
            wallMesh.count = instanceId;
            scene.add(wallMesh);

            exitBlock.position.set((Math.random() > 0.5 ? 1 : -1) * (mapSize/2.5) * wallSize, 1.5, (Math.random() > 0.5 ? 1 : -1) * (mapSize/2.5) * wallSize);
            
            // Spawn monster far away
            monster.position.set(-exitBlock.position.x, 1.25, -exitBlock.position.z);
            monsterTarget.copy(monster.position);
            isChasing = false;
            
            document.getElementById('level-text').innerText = currentLevel;
        }

        // --- 6. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xfffff0, 1.5); 
        scene.add(ambientLight);
        
        const flashlight = new THREE.PointLight(0xffffff, 0.8, 20); 
        camera.add(flashlight);
        scene.add(camera);

        // --- 7. POST-PROCESSING (INTENSE FISHEYE) ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const VhsShader = {
            uniforms: { "tDiffuse": { value: null }, "time": { value: 0.0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float time;
                varying vec2 vUv;
                
                void main() {
                    vec2 uv = vUv;
                    vec2 center = vec2(0.5, 0.5); 
                    vec2 d = uv - center; 
                    
                    if(length(d) == 0.0) d = vec2(0.001, 0.0);
                    
                    // Increased Fisheye Power
                    float r = length(d); 
                    float power = 1.2; 
                    float bind = sqrt(0.5);
                    uv = center + normalize(d) * tan(r * power) * bind / tan(bind * power);
                    
                    if(uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) { gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0); return; }

                    float offset = 0.003 + sin(uv.y * 10.0 + time) * 0.002;
                    float rColor = texture2D(tDiffuse, uv + vec2(offset, 0.0)).r;
                    float gColor = texture2D(tDiffuse, uv).g;
                    float bColor = texture2D(tDiffuse, uv - vec2(offset, 0.0)).b;
                    
                    float noise = fract(sin(dot(uv + time, vec2(12.9898,78.233))) * 43758.5453) * 0.06;
                    vec3 finalColor = vec3(rColor, gColor, bColor) - noise;
                    
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `
        };

        const vhsPass = new ShaderPass(VhsShader);
        composer.addPass(vhsPass);

        // --- 8. GAME LOOP ---
        const clock = new THREE.Clock();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const playerRadius = 0.4; 
        let isDead = false;
        let flashInterval;

        generateLevel();

        function animate() {
            requestAnimationFrame(animate);
            if (isDead) {
                // Force camera to stare at monster during jumpscare
                camera.lookAt(monster.position);
                composer.render();
                return;
            }

            const delta = Math.min(clock.getDelta(), 0.1);
            vhsPass.uniforms["time"].value += delta;

            if(Math.random() > 0.98) flashlight.intensity = Math.random() * 0.5 + 0.3;
            else flashlight.intensity = 0.8;

            if(humGain) humGain.gain.value = 0.08 + Math.random() * 0.02;

            if (controls.isLocked) {
                // Fast Player Speed
                const speed = moveState.sprint ? 16.0 : 10.0;
                
                const damping = Math.max(0, 1.0 - 10.0 * delta);
                velocity.x *= damping;
                velocity.z *= damping;

                direction.z = Number(moveState.forward) - Number(moveState.backward);
                direction.x = Number(moveState.right) - Number(moveState.left);
                
                if (direction.lengthSq() > 0) direction.normalize();

                if (moveState.forward || moveState.backward) velocity.z -= direction.z * speed * delta;
                if (moveState.left || moveState.right) velocity.x -= direction.x * speed * delta;

                // --- COLLISION DETECTION ---
                const oldPos = camera.position.clone();
                
                controls.moveRight(-velocity.x * delta);
                let newXPos = camera.position.clone();
                let collidedX = false;
                for(let w of walls) {
                    if (newXPos.x + playerRadius > w.minX && newXPos.x - playerRadius < w.maxX && oldPos.z + playerRadius > w.minZ && oldPos.z - playerRadius < w.maxZ) { collidedX = true; break; }
                }
                if(collidedX) { camera.position.x = oldPos.x; velocity.x = 0; }

                const currentPosAfterX = camera.position.clone();
                controls.moveForward(-velocity.z * delta);
                let newZPos = camera.position.clone();
                let collidedZ = false;
                for(let w of walls) {
                    if (currentPosAfterX.x + playerRadius > w.minX && currentPosAfterX.x - playerRadius < w.maxX && newZPos.z + playerRadius > w.minZ && newZPos.z - playerRadius < w.maxZ) { collidedZ = true; break; }
                }
                if(collidedZ) { camera.position.z = currentPosAfterX.z; velocity.z = 0; }

                // --- MONSTER AI (STEALTH & LOS) ---
                const distToPlayer = monster.position.distanceTo(camera.position);
                
                // Update Red Vignette Proximity Threat
                const vignette = document.getElementById('vignette');
                if(distToPlayer < 25) vignette.style.opacity = 1.0 - (distToPlayer / 25);
                else vignette.style.opacity = 0;

                // Raycast Line of Sight
                const rayOrigin = new THREE.Vector3(monster.position.x, 1.5, monster.position.z);
                const dirToPlayer = new THREE.Vector3().subVectors(camera.position, rayOrigin).normalize();
                raycaster.set(rayOrigin, dirToPlayer);
                
                const intersects = raycaster.intersectObject(wallMesh);
                let canSeePlayer = true;
                
                if(intersects.length > 0 && intersects[0].distance < distToPlayer) {
                    canSeePlayer = false; // A wall is blocking the view
                }

                if (canSeePlayer) {
                    monsterTarget.copy(camera.position);
                    monsterTarget.y = 1.25;
                    isChasing = true;
                } else {
                    if (isChasing) {
                        // Just lost sight, head to last known spot
                        if (monster.position.distanceTo(monsterTarget) < 1.0) isChasing = false;
                    }
                    if (!isChasing) {
                        // Lost the player entirely, wander aimlessly
                        if (monster.position.distanceTo(monsterTarget) < 1.0 || Math.random() < 0.02) {
                            monsterTarget.set(
                                monster.position.x + (Math.random() - 0.5) * 15,
                                1.25,
                                monster.position.z + (Math.random() - 0.5) * 15
                            );
                        }
                    }
                }

                // Move Monster (Speed: 7.0 - Slower than Player base speed of 10.0)
                const moveDir = new THREE.Vector3().subVectors(monsterTarget, monster.position);
                moveDir.y = 0;
                if (moveDir.lengthSq() > 0) {
                    moveDir.normalize();
                    monster.position.addScaledVector(moveDir, 7.0 * delta);
                    monster.lookAt(monsterTarget.x, monster.position.y, monsterTarget.z);
                }

                // Interactions
                if (distToPlayer < 1.6) triggerJumpscare();
                if (camera.position.distanceTo(exitBlock.position) < 2.5) {
                    currentLevel++;
                    generateLevel();
                }
            }
            
            composer.render();
        }

        function triggerJumpscare() {
            isDead = true;
            controls.unlock();
            playJumpscare();
            
            // Snap camera to monster
            camera.lookAt(monster.position);
            
            const jsDiv = document.getElementById('jumpscare');
            jsDiv.style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('rec').style.display = 'none';
            document.getElementById('vignette').style.opacity = 0;
            
            // Chaotic screen flashing
            let flashCount = 0;
            flashInterval = setInterval(() => {
                jsDiv.style.backgroundColor = flashCount % 2 === 0 ? '#ff0000' : '#000000';
                jsDiv.style.color = flashCount % 2 === 0 ? '#000000' : '#ffffff';
                jsDiv.style.transform = `translate(${(Math.random()-0.5)*20}px, ${(Math.random()-0.5)*20}px)`;
                flashCount++;
            }, 40);
            
            setTimeout(() => {
                clearInterval(flashInterval);
                jsDiv.style.transform = 'translate(0,0)';
                isDead = false;
                currentLevel = 1;
                jsDiv.style.display = 'none';
                blocker.style.display = 'flex';
                generateLevel();
            }, 3000);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>

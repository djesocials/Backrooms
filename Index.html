<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - Cross-Platform Stealth Build</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #d0ca8d; font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transition: opacity 0.1s; background: radial-gradient(circle, transparent 20%, rgba(200,0,0,0.8) 120%); opacity: 0; z-index: 5; }

        #blocker { position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; pointer-events: auto; z-index: 30; }
        #instructions { font-size: 20px; cursor: pointer; text-align: center; max-width: 600px; padding: 20px; border: 1px solid #ccaa00; background: rgba(20,20,0,0.5); }
        .glitch { font-size: 40px; color: #ccaa00; font-weight: bold; text-shadow: 2px 2px #ff0000, -2px -2px #0000ff; animation: glitch 1s infinite linear; }
        
        #hud { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 24px; text-shadow: 2px 2px 0 #000; display: none; z-index: 10; }
        #rec { position: absolute; top: 20px; right: 30px; color: red; font-size: 24px; font-weight: bold; animation: blink 1s infinite; display: none; z-index: 10; }
        
        #jumpscare { display: none; position: absolute; width: 100%; height: 100%; z-index: 50; flex-direction: column; align-items: center; justify-content: center; background-color: #000; color: #fff; font-size: 120px; font-weight: bold; text-align: center; text-shadow: 5px 5px 0 #f00, -5px -5px 0 #00f; }

        /* Mobile Controls UI */
        #mobile-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; display: none; }
        #joystick-base { position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; transform: translate(-50%, -50%); }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes glitch { 
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
    </style>
</head>
<body>
    <div id="vignette"></div>
    <div id="jumpscare">CAUGHT</div>
    
    <div id="mobile-ui">
        <div id="joystick-base"><div id="joystick-stick"></div></div>
    </div>

    <div id="ui-layer">
        <div id="hud">LEVEL: <span id="level-text">1</span></div>
        <div id="rec">● REC</div>
    </div>
    
    <div id="blocker">
        <div id="instructions">
            <p class="glitch">THE BACKROOMS</p>
            <p id="desktop-text">WASD = Move | Mouse = Look | SHIFT = Sprint</p>
            <p id="mobile-text" style="display: none; color: #fff;">Left Thumb = Move/Sprint | Right Thumb = Look</p>
            <p style="color: #0f0; font-weight: bold;">[ TAP OR CLICK TO ENTER ]</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // --- DEVICE DETECTION ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // --- 1. CORE SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd0ca8d); 
        scene.fog = new THREE.FogExp2(0xd0ca8d, 0.02); 

        const camera = new THREE.PerspectiveCamera(110, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.y = 1.6;

        const renderer = new THREE.WebGLRenderer({ powerPreference: "high-performance", antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. AUDIO ENGINE ---
        let audioCtx;
        let humOscillator, humGain;

        function initAudio() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            humOscillator = audioCtx.createOscillator();
            humOscillator.type = 'sawtooth';
            humOscillator.frequency.value = 60; 
            humGain = audioCtx.createGain();
            humGain.gain.value = 0.08; 
            const lowpass = audioCtx.createBiquadFilter();
            lowpass.type = 'lowpass';
            lowpass.frequency.value = 250;
            humOscillator.connect(lowpass).connect(humGain).connect(audioCtx.destination);
            humOscillator.start();
        }

        function playJumpscare() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc.connect(gainNode).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        // --- 3. CONTROLS (DESKTOP & MOBILE INTEGRATION) ---
        let isDead = false;
        let isPlaying = false;
        const blocker = document.getElementById('blocker');
        const hud = document.getElementById('hud');
        const rec = document.getElementById('rec');
        
        // Desktop
        const controls = new PointerLockControls(camera, document.body);
        const moveState = { forward: false, backward: false, left: false, right: false, sprint: false };
        
        // Mobile State
        let moveTouchId = null;
        let lookTouchId = null;
        const moveVector = new THREE.Vector2(0, 0);
        let lastLookX = 0, lastLookY = 0;
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');

        if (isMobile) {
            document.getElementById('desktop-text').style.display = 'none';
            document.getElementById('mobile-text').style.display = 'block';
            document.getElementById('mobile-ui').style.display = 'block';

            const jBase = document.getElementById('joystick-base');
            const jStick = document.getElementById('joystick-stick');
            let jStartX = 0, jStartY = 0;

            document.addEventListener('touchstart', (e) => {
                if(!isPlaying || isDead) return;
                for(let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    if(touch.clientX < window.innerWidth / 2 && moveTouchId === null) {
                        moveTouchId = touch.identifier;
                        jStartX = touch.clientX; jStartY = touch.clientY;
                        jBase.style.left = jStartX + 'px';
                        jBase.style.top = jStartY + 'px';
                        jBase.style.display = 'block';
                        jStick.style.transform = `translate(-50%, -50%)`;
                    } else if(touch.clientX >= window.innerWidth / 2 && lookTouchId === null) {
                        lookTouchId = touch.identifier;
                        lastLookX = touch.clientX; lastLookY = touch.clientY;
                    }
                }
            }, {passive: false});

            document.addEventListener('touchmove', (e) => {
                if(!isPlaying || isDead) return;
                for(let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    
                    if(touch.identifier === moveTouchId) {
                        let dx = touch.clientX - jStartX;
                        let dy = touch.clientY - jStartY;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        const maxDist = 40; 
                        
                        if(dist > maxDist) {
                            dx = (dx / dist) * maxDist;
                            dy = (dy / dist) * maxDist;
                        }
                        
                        jStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        
                        // Push to edge = auto sprint
                        moveState.sprint = dist > 35;
                        
                        moveVector.x = dx / maxDist;
                        moveVector.y = dy / maxDist;
                        
                    } else if(touch.identifier === lookTouchId) {
                        const deltaX = touch.clientX - lastLookX;
                        const deltaY = touch.clientY - lastLookY;
                        lastLookX = touch.clientX; lastLookY = touch.clientY;

                        euler.setFromQuaternion(camera.quaternion);
                        euler.y -= deltaX * 0.005;
                        euler.x -= deltaY * 0.005;
                        euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x));
                        camera.quaternion.setFromEuler(euler);
                    }
                }
            }, {passive: false});

            document.addEventListener('touchend', (e) => {
                for(let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    if(touch.identifier === moveTouchId) {
                        moveTouchId = null;
                        jBase.style.display = 'none';
                        moveVector.set(0,0);
                        moveState.sprint = false;
                    } else if(touch.identifier === lookTouchId) {
                        lookTouchId = null;
                    }
                }
            });

            blocker.addEventListener('click', () => {
                initAudio();
                blocker.style.display = 'none';
                hud.style.display = 'block';
                rec.style.display = 'block';
                isPlaying = true;
                if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            });

        } else {
            // DESKTOP CONTROLS
            blocker.addEventListener('click', () => {
                initAudio();
                controls.lock();
            });

            controls.addEventListener('lock', () => {
                blocker.style.display = 'none';
                hud.style.display = 'block';
                rec.style.display = 'block';
                isPlaying = true;
                if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            });

            controls.addEventListener('unlock', () => {
                if(!isDead) blocker.style.display = 'flex';
                hud.style.display = 'none';
                rec.style.display = 'none';
                isPlaying = false;
                if(audioCtx) audioCtx.suspend();
            });

            document.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': moveState.forward = true; break;
                    case 'KeyA': moveState.left = true; break;
                    case 'KeyS': moveState.backward = true; break;
                    case 'KeyD': moveState.right = true; break;
                    case 'ShiftLeft': moveState.sprint = true; break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': moveState.forward = false; break;
                    case 'KeyA': moveState.left = false; break;
                    case 'KeyS': moveState.backward = false; break;
                    case 'KeyD': moveState.right = false; break;
                    case 'ShiftLeft': moveState.sprint = false; break;
                }
            });
        }

        // --- 4. PROCEDURAL TEXTURES ---
        function createWallTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#cfb974'; ctx.fillRect(0, 0, 256, 256); ctx.strokeStyle = '#b8a158'; ctx.lineWidth = 6;
            for(let i = 16; i < 256; i += 64) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 256); ctx.stroke();
                for(let j = 32; j < 256; j += 64) {
                    ctx.beginPath(); ctx.moveTo(i, j); ctx.lineTo(i+10, j+15); ctx.lineTo(i, j+30); ctx.lineTo(i-10, j+15); ctx.fill();
                }
            }
            for(let i=0; i<5000; i++) { ctx.fillStyle = `rgba(100, 80, 0, ${Math.random() * 0.05})`; ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2); }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(2, 2); return tex;
        }

        function createCeilingTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e8e8e8'; ctx.fillRect(0, 0, 256, 256); ctx.strokeStyle = '#aaaaaa'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, 256, 256);
            for(let i=0; i<8000; i++) { ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.1})`; ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2); }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(15, 15); return tex;
        }

        function createCarpetTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#a89456'; ctx.fillRect(0, 0, 256, 256);
            for(let i=0; i<30000; i++) { ctx.fillStyle = `rgba(50, 40, 10, ${Math.random() * 0.15})`; ctx.fillRect(Math.random()*256, Math.random()*256, 1, 1); }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(10, 10); return tex;
        }

        const wallMat = new THREE.MeshLambertMaterial({ map: createWallTexture() }); 
        const floorMat = new THREE.MeshLambertMaterial({ map: createCarpetTexture() }); 
        const ceilingMat = new THREE.MeshLambertMaterial({ map: createCeilingTexture() }); 

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), floorMat); floor.rotation.x = -Math.PI / 2; scene.add(floor);
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), ceilingMat); ceiling.rotation.x = Math.PI / 2; ceiling.position.y = 3; scene.add(ceiling);

        // --- 5. GAME LOGIC & MAZE GENERATION ---
        let currentLevel = 1;
        let mapSize = 25; 
        const wallSize = 3;
        let walls = [];
        let wallMesh; 
        
        const exitGeo = new THREE.BoxGeometry(wallSize, 3, wallSize);
        const exitMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 });
        const exitBlock = new THREE.Mesh(exitGeo, exitMat);
        const exitLight = new THREE.PointLight(0x00ff00, 1, 15);
        exitBlock.add(exitLight);
        scene.add(exitBlock);

        const monsterGeo = new THREE.BoxGeometry(1.2, 2.5, 1.2);
        const monsterMat = new THREE.MeshBasicMaterial({ color: 0x050505 }); 
        const monster = new THREE.Mesh(monsterGeo, monsterMat);
        scene.add(monster);

        let monsterTarget = new THREE.Vector3();
        let isChasing = false;
        const raycaster = new THREE.Raycaster();

        function generateLevel() {
            walls = [];
            if (wallMesh) scene.remove(wallMesh);

            camera.position.set(0, 1.6, 0);

            const wallGeo = new THREE.BoxGeometry(wallSize, 3, wallSize);
            wallMesh = new THREE.InstancedMesh(wallGeo, wallMat, mapSize * mapSize);
            let instanceId = 0;
            const dummy = new THREE.Object3D();

            for(let x = -mapSize/2; x < mapSize/2; x++) {
                for(let z = -mapSize/2; z < mapSize/2; z++) {
                    if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;
                    if(Math.random() > 0.65) {
                        const worldX = x * wallSize;
                        const worldZ = z * wallSize;
                        dummy.position.set(worldX, 1.5, worldZ);
                        dummy.updateMatrix();
                        wallMesh.setMatrixAt(instanceId++, dummy.matrix);
                        walls.push({ minX: worldX - (wallSize / 2), maxX: worldX + (wallSize / 2), minZ: worldZ - (wallSize / 2), maxZ: worldZ + (wallSize / 2) });
                    }
                }
            }
            wallMesh.count = instanceId; scene.add(wallMesh);
            exitBlock.position.set((Math.random() > 0.5 ? 1 : -1) * (mapSize/2.5) * wallSize, 1.5, (Math.random() > 0.5 ? 1 : -1) * (mapSize/2.5) * wallSize);
            monster.position.set(-exitBlock.position.x, 1.25, -exitBlock.position.z);
            monsterTarget.copy(monster.position);
            isChasing = false;
            document.getElementById('level-text').innerText = currentLevel;
        }

        // --- 6. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xfffff0, 1.5); scene.add(ambientLight);
        const flashlight = new THREE.PointLight(0xffffff, 0.8, 20); camera.add(flashlight); scene.add(camera);

        // --- 7. POST-PROCESSING (INTENSE FISHEYE) ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const VhsShader = {
            uniforms: { "tDiffuse": { value: null }, "time": { value: 0.0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform float time; varying vec2 vUv;
                void main() {
                    vec2 uv = vUv; vec2 center = vec2(0.5, 0.5); vec2 d = uv - center; 
                    if(length(d) == 0.0) d = vec2(0.001, 0.0);
                    float r = length(d); float power = 1.2; float bind = sqrt(0.5);
                    uv = center + normalize(d) * tan(r * power) * bind / tan(bind * power);
                    if(uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) { gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0); return; }
                    float offset = 0.003 + sin(uv.y * 10.0 + time) * 0.002;
                    float rColor = texture2D(tDiffuse, uv + vec2(offset, 0.0)).r;
                    float gColor = texture2D(tDiffuse, uv).g;
                    float bColor = texture2D(tDiffuse, uv - vec2(offset, 0.0)).b;
                    float noise = fract(sin(dot(uv + time, vec2(12.9898,78.233))) * 43758.5453) * 0.06;
                    gl_FragColor = vec4(vec3(rColor, gColor, bColor) - noise, 1.0);
                }
            `
        };
        const vhsPass = new ShaderPass(VhsShader); composer.addPass(vhsPass);

        // --- 8. GAME LOOP ---
        const clock = new THREE.Clock();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const playerRadius = 0.4; 
        let flashInterval;

        generateLevel();

        function animate() {
            requestAnimationFrame(animate);
            if (isDead) { camera.lookAt(monster.position); composer.render(); return; }

            const delta = Math.min(clock.getDelta(), 0.1);
            vhsPass.uniforms["time"].value += delta;
            flashlight.intensity = Math.random() > 0.98 ? Math.random() * 0.5 + 0.3 : 0.8;
            if(humGain) humGain.gain.value = 0.08 + Math.random() * 0.02;

            if (isPlaying) {
                const speed = moveState.sprint ? 16.0 : 10.0;
                const damping = Math.max(0, 1.0 - 10.0 * delta);
                velocity.x *= damping; velocity.z *= damping;

                let forwardAmt = 0; let rightAmt = 0;
                
                if(isMobile) {
                    forwardAmt = -moveVector.y;
                    rightAmt = moveVector.x;
                } else {
                    forwardAmt = Number(moveState.forward) - Number(moveState.backward);
                    rightAmt = Number(moveState.right) - Number(moveState.left);
                }

                direction.z = forwardAmt; direction.x = rightAmt;
                if (direction.lengthSq() > 0) direction.normalize();

                velocity.z -= direction.z * speed * delta;
                velocity.x -= direction.x * speed * delta;

                // Move relative to camera yaw
                euler.setFromQuaternion(camera.quaternion);
                const moveVec = new THREE.Vector3(velocity.x * delta, 0, velocity.z * delta);
                moveVec.applyEuler(new THREE.Euler(0, euler.y, 0, 'YXZ'));

                // Collisions
                let newX = camera.position.x - moveVec.x; let newZ = camera.position.z - moveVec.z;
                
                let colX = false;
                for(let w of walls) { if (newX + playerRadius > w.minX && newX - playerRadius < w.maxX && camera.position.z + playerRadius > w.minZ && camera.position.z - playerRadius < w.maxZ) { colX = true; break; } }
                if(!colX) camera.position.x = newX; else velocity.x = 0;

                let colZ = false;
                for(let w of walls) { if (camera.position.x + playerRadius > w.minX && camera.position.x - playerRadius < w.maxX && newZ + playerRadius > w.minZ && newZ - playerRadius < w.maxZ) { colZ = true; break; } }
                if(!colZ) camera.position.z = newZ; else velocity.z = 0;

                // --- MONSTER AI ---
                const distToPlayer = monster.position.distanceTo(camera.position);
                const vignette = document.getElementById('vignette');
                vignette.style.opacity = distToPlayer < 25 ? 1.0 - (distToPlayer / 25) : 0;

                const rayOrigin = new THREE.Vector3(monster.position.x, 1.5, monster.position.z);
                const dirToPlayer = new THREE.Vector3().subVectors(camera.position, rayOrigin).normalize();
                raycaster.set(rayOrigin, dirToPlayer);
                const intersects = raycaster.intersectObject(wallMesh);
                
                let canSeePlayer = !(intersects.length > 0 && intersects[0].distance < distToPlayer);

                if (canSeePlayer) {
                    monsterTarget.copy(camera.position); monsterTarget.y = 1.25; isChasing = true;
                } else {
                    if (isChasing && monster.position.distanceTo(monsterTarget) < 1.0) isChasing = false;
                    if (!isChasing && (monster.position.distanceTo(monsterTarget) < 1.0 || Math.random() < 0.02)) {
                        monsterTarget.set(monster.position.x + (Math.random() - 0.5) * 15, 1.25, monster.position.z + (Math.random() - 0.5) * 15);
                    }
                }

                const moveDir = new THREE.Vector3().subVectors(monsterTarget, monster.position);
                moveDir.y = 0;
                if (moveDir.lengthSq() > 0) {
                    moveDir.normalize();
                    monster.position.addScaledVector(moveDir, 7.0 * delta);
                    monster.lookAt(monsterTarget.x, monster.position.y, monsterTarget.z);
                }

                if (distToPlayer < 1.6) triggerJumpscare();
                if (camera.position.distanceTo(exitBlock.position) < 2.5) { currentLevel++; generateLevel(); }
            }
            composer.render();
        }

        function triggerJumpscare() {
            isDead = true; isPlaying = false;
            if(!isMobile) controls.unlock();
            playJumpscare();
            camera.lookAt(monster.position);
            
            const jsDiv = document.getElementById('jumpscare');
            jsDiv.style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('rec').style.display = 'none';
            document.getElementById('vignette').style.opacity = 0;
            if(isMobile) document.getElementById('mobile-ui').style.display = 'none';
            
            let flashCount = 0;
            flashInterval = setInterval(() => {
                jsDiv.style.backgroundColor = flashCount % 2 === 0 ? '#ff0000' : '#000000';
                jsDiv.style.color = flashCount % 2 === 0 ? '#000000' : '#ffffff';
                jsDiv.style.transform = `translate(${(Math.random()-0.5)*20}px, ${(Math.random()-0.5)*20}px)`;
                flashCount++;
            }, 40);
            
            setTimeout(() => {
                clearInterval(flashInterval);
                jsDiv.style.transform = 'translate(0,0)';
                isDead = false; currentLevel = 1;
                jsDiv.style.display = 'none';
                blocker.style.display = 'flex';
                if(isMobile) document.getElementById('mobile-ui').style.display = 'block';
                generateLevel();
            }, 3000);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Backrooms Remake</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:monospace}
#hud{position:fixed;top:10px;left:10px;color:white}
</style>
</head>
<body>
<div id="hud">BACKROOMS REMAKE</div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x222211,5,60);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,100);
camera.position.set(0,1.7,0);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const light=new THREE.HemisphereLight(0xffffee,0x111111,2);
scene.add(light);

const floor=new THREE.Mesh(
 new THREE.PlaneGeometry(200,200),
 new THREE.MeshLambertMaterial({color:0x6b5d2e})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

// Simple grid-based corridors
for(let x=-20;x<20;x++){
 for(let z=-20;z<20;z++){
   if(Math.random()<0.18){
     const wall=new THREE.Mesh(
       new THREE.BoxGeometry(4,4,4),
       new THREE.MeshLambertMaterial({color:0xcabf75})
     );
     wall.position.set(x*4,2,z*4);
     scene.add(wall);
   }
 }
}

function animate(){
 requestAnimationFrame(animate);
 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>

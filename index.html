<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms: Level 0</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none; -webkit-user-select: none;
            touch-action: none; 
        }
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        /* UI Overlays */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; color: #fff;
            text-shadow: 2px 2px 0 #000;
        }
        #camcorder-ui {
            position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold;
        }
        .blinking-rec { color: red; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        
        #battery-ui { position: absolute; top: 20px; right: 20px; font-size: 20px; }
        
        /* Stats HUD Container */
        #hud-stats-container {
            position: absolute; bottom: 20px; right: 20px;
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 8px; font-size: 16px; font-weight: bold;
        }
        .bar-wrapper {
            display: flex; align-items: center; gap: 10px;
        }
        .meter-container {
            width: 150px; height: 10px; border: 1px solid #fff;
            background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 4px rgba(0,0,0,0.8);
        }
        .meter-fill {
            height: 100%; width: 100%; transition: width 0.05s linear;
        }
        #health-fill { background: #ff3333; box-shadow: 0 0 8px #ff0000; }
        #stamina-fill { background: #33ff33; box-shadow: 0 0 8px #00ff00; }
        
        /* Mobile Controls Visual layer */
        #mobile-interface {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; pointer-events: none;
        }
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.4);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.6);
            transform: translate(-50%, -50%);
        }
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        button {
            padding: 15px 30px; font-size: 20px; font-family: 'Courier New', monospace;
            background: #222; color: #fff; border: 1px solid #fff; cursor: pointer;
            margin-top: 20px; pointer-events: auto;
        }
        button:hover { background: #444; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="start-screen">
        <h1>THE BACKROOMS</h1>
        <p>Desktop: WASD + Mouse to Look (Hold Shift to Sprint)</p>
        <p>Mobile: Left Screen Joystick + Right Screen Drag (Push Joystick Out to Sprint)</p>
        <p>WARNING: Flashing lights and loud noises.</p>
        <button id="start-btn">ENTER LEVEL 0</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="camcorder-ui"><span class="blinking-rec">●</span> REC <span id="timecode">00:00:00</span></div>
        <div id="battery-ui">PWR: 100%</div>
        
        <div id="hud-stats-container">
            <div class="bar-wrapper">
                <span>VIT</span>
                <div class="meter-container"><div id="health-fill" class="meter-fill"></div></div>
            </div>
            <div class="bar-wrapper">
                <span>STM</span>
                <div class="meter-container"><div id="stamina-fill" class="meter-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="mobile-interface">
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
    </div>

<script>
/**
 * ARCHITECTURE & ENGINE SETUP
 */
const GAME_STATE = {
    isRunning: false,
    power: 100.0,
    health: 100.0,
    stamina: 100.0,
    isFlashlightOn: true,
    time: 0
};

let audioCtx;

const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x12110d, 0.05); 
renderer.setClearColor(scene.fog.color);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
const camContainer = new THREE.Object3D();
camContainer.position.set(0, 1.7, 0);
scene.add(camContainer);
camContainer.add(camera);

const renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
const orthoCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const quadScene = new THREE.Scene();

/**
 * CLEAN FOUND FOOTAGE SHADER (Less 'Glitchy')
 */
const vhsMaterial = new THREE.ShaderMaterial({
    uniforms: {
        tDiffuse: { value: null },
        time: { value: 0.0 },
        distortionAmount: { value: 0.001 } // Kept extremely low
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float time;
        uniform float distortionAmount;
        varying vec2 vUv;

        float rand(vec2 co) {
            return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
        }

        void main() {
            vec2 uv = vUv;
            
            // REMOVED: Tape Tracking Jitter (Horizontal glitching)

            // MODIFIED: Reduced Chromatic Aberration offset
            float rAmount = distortionAmount * 1.1; 
            float bAmount = -distortionAmount * 1.1;

            float r = texture2D(tDiffuse, vec2(uv.x + rAmount, uv.y)).r;
            float g = texture2D(tDiffuse, uv).g;
            float b = texture2D(tDiffuse, vec2(uv.x + bAmount, uv.y)).b;

            // MODIFIED: Fainter, strictly visual scanlines
            float scanline = sin(uv.y * 800.0) * 0.02;
            
            // MODIFIED: Significantly reduced Digital Noise grain
            float noise = (rand(uv * time) - 0.5) * 0.03;

            // Color grading and composition
            vec3 color = vec3(r, g, b) - scanline + noise;
            float luma = dot(color, vec3(0.299, 0.587, 0.114));
            
            color = mix(color, vec3(luma), 0.15); // Slight desaturation
            color = pow(color, vec3(1.1)); // Mild gamma boost

            gl_FragColor = vec4(color, 1.0);
        }
    `
});
const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), vhsMaterial);
quadScene.add(quad);

/**
 * ENVIRONMENT GENERATION
 */
const ambientLight = new THREE.AmbientLight(0xebe3c3, 0.22);
scene.add(ambientLight);

const wallMat = new THREE.MeshLambertMaterial({ color: 0xd6c585 }); 
const floorMat = new THREE.MeshLambertMaterial({ color: 0x7a6f50 }); 
const ceilMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });

const boxGeo = new THREE.BoxGeometry(4, 4, 4);
const planeGeo = new THREE.PlaneGeometry(4, 4);
planeGeo.rotateX(-Math.PI / 2);

const mazeSize = 20;
const cellSize = 4;
const walls = [];

for(let x = -mazeSize/2; x < mazeSize/2; x++) {
    for(let z = -mazeSize/2; z < mazeSize/2; z++) {
        const floor = new THREE.Mesh(planeGeo, floorMat);
        floor.position.set(x * cellSize, 0, z * cellSize);
        scene.add(floor);

        const ceil = new THREE.Mesh(planeGeo, ceilMat);
        ceil.position.set(x * cellSize, 4, z * cellSize);
        ceil.rotation.x = Math.PI;
        scene.add(ceil);

        if (Math.random() < 0.25 && (x !== 0 || z !== 0)) {
            const wall = new THREE.Mesh(boxGeo, wallMat);
            wall.position.set(x * cellSize, 2, z * cellSize);
            scene.add(wall);
            walls.push(new THREE.Box3().setFromObject(wall));
        }

        if (Math.random() < 0.1) {
            const light = new THREE.PointLight(0xfff5e6, 0.7, 12);
            light.position.set(x * cellSize, 3.8, z * cellSize);
            light.userData.flicker = Math.random() < 0.15;
            scene.add(light);
        }
    }
}

const flashLight = new THREE.SpotLight(0xffffff, 3.5, 35, Math.PI/4, 0.6, 1);
flashLight.position.set(0, 0, 0);
flashLight.target.position.set(0, 0, -1);
camera.add(flashLight);
camera.add(flashLight.target);

/**
 * THE SMILER (ENTITY AI)
 */
const faceCanvas = document.createElement('canvas');
faceCanvas.width = 256;
faceCanvas.height = 256;
const fCtx = faceCanvas.getContext('2d');

fCtx.fillStyle = '#000000';
fCtx.fillRect(0, 0, 256, 256);
fCtx.fillStyle = '#ffffff';
fCtx.shadowBlur = 15;
fCtx.shadowColor = '#ffffff';

fCtx.beginPath(); fCtx.arc(80, 100, 12, 0, Math.PI * 2); fCtx.fill();
fCtx.beginPath(); fCtx.arc(176, 100, 12, 0, Math.PI * 2); fCtx.fill();

fCtx.strokeStyle = '#ffffff';
fCtx.lineWidth = 6;
fCtx.beginPath();
fCtx.arc(128, 120, 70, 0.1 * Math.PI, 0.9 * Math.PI);
fCtx.stroke();

fCtx.lineWidth = 3;
fCtx.shadowBlur = 5;
for (let i = 70; i <= 186; i += 12) {
    let topY = 150 + Math.sin(i * 0.05) * 10;
    fCtx.beginPath(); fCtx.moveTo(i, topY); fCtx.lineTo(i + 5, topY + 15); fCtx.lineTo(i + 10, topY); fCtx.fill();
    fCtx.beginPath(); fCtx.moveTo(i, topY + 20); fCtx.lineTo(i + 5, topY + 5); fCtx.lineTo(i + 10, topY + 20); fCtx.fill();
}

const smilerTexture = new THREE.CanvasTexture(faceCanvas);
const smilerGeo = new THREE.PlaneGeometry(2.5, 2.5); 
const smilerMat = new THREE.MeshBasicMaterial({ 
    map: smilerTexture, 
    transparent: true,
    blending: THREE.AdditiveBlending 
}); 

const smiler = new THREE.Mesh(smilerGeo, smilerMat);
smiler.position.set(12, 1.3, -12);
scene.add(smiler);

const smilerState = { state: 'STALK' };

/**
 * UNIFIED GLOBAL INTERCEPTION CONTROL ENGINE
 */
let moveVector = new THREE.Vector3();
let joystickRawIntensity = 0; 
let lookEuler = new THREE.Euler(0, 0, 0, 'YXZ');
let keys = { w: false, a: false, s: false, d: false, shift: false };

// Keyboard Tracking
document.addEventListener('keydown', e => {
    let k = e.key.toLowerCase();
    if(k in keys) keys[k] = true;
    if(e.key === 'Shift') keys.shift = true;
});
document.addEventListener('keyup', e => {
    let k = e.key.toLowerCase();
    if(k in keys) keys[k] = false;
    if(e.key === 'Shift') keys.shift = false;
});

// Desktop Mouse Look Pipeline
document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
document.addEventListener('mousemove', e => {
    if(document.pointerLockElement === document.body) {
        lookEuler.y -= e.movementX * 0.002;
        lookEuler.x -= e.movementY * 0.002;
        lookEuler.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, lookEuler.x));
    }
});

// Hardware-Isolated Screen Vector Tracking
let joystickPointerId = null;
let lookPointerId = null;
let stickCenter = { x: 0, y: 0 };
let lastLookX = 0, lastLookY = 0;

const knob = document.getElementById('joystick-knob');
const joystickZone = document.getElementById('joystick-zone');

window.addEventListener('pointerdown', e => {
    if (!GAME_STATE.isRunning) return;
    if (e.target.tagName === 'BUTTON') return; 

    const rect = joystickZone.getBoundingClientRect();
    const jCenterX = rect.left + rect.width / 2;
    const jCenterY = rect.top + rect.height / 2;

    const dx = e.clientX - jCenterX;
    const dy = e.clientY - jCenterY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance <= rect.width / 2 + 40 && joystickPointerId === null) {
        joystickPointerId = e.pointerId;
        stickCenter = { x: jCenterX, y: jCenterY };
        handleJoystickCalculation(e);
    } 
    else if (lookPointerId === null) {
        lookPointerId = e.pointerId;
        lastLookX = e.clientX;
        lastLookY = e.clientY;
    }
});

window.addEventListener('pointermove', e => {
    if (e.pointerId === joystickPointerId) {
        handleJoystickCalculation(e);
    } else if (e.pointerId === lookPointerId) {
        const dx = e.clientX - lastLookX;
        const dy = e.clientY - lastLookY;

        lookEuler.y -= dx * 0.005;
        lookEuler.x -= dy * 0.005;
        lookEuler.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, lookEuler.x));

        lastLookX = e.clientX;
        lastLookY = e.clientY;
    }
});

const clearPointerTracking = e => {
    if (e.pointerId === joystickPointerId) {
        joystickPointerId = null;
        knob.style.transform = `translate(-50%, -50%)`;
        moveVector.set(0, 0, 0);
        joystickRawIntensity = 0;
    } else if (e.pointerId === lookPointerId) {
        lookPointerId = null;
    }
};

window.addEventListener('pointerup', clearPointerTracking);
window.addEventListener('pointercancel', clearPointerTracking);

function handleJoystickCalculation(e) {
    let dx = e.clientX - stickCenter.x;
    let dy = e.clientY - stickCenter.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxDist = 40;
    const clampDist = Math.min(dist, maxDist);
    const angle = Math.atan2(dy, dx);

    knob.style.transform = `translate(calc(-50% + ${Math.cos(angle) * clampDist}px), calc(-50% + ${Math.sin(angle) * clampDist}px))`;

    joystickRawIntensity = clampDist / maxDist;
    moveVector.set(Math.cos(angle) * joystickRawIntensity, 0, Math.sin(angle) * joystickRawIntensity);
}

/**
 * AUDIO SYSTEM
 */
function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function triggerJumpscare() {
    GAME_STATE.isRunning = false;
    vhsMaterial.uniforms.distortionAmount.value = 0.8; // Shatter color tracking on death
    
    document.getElementById('ui-layer').innerHTML = `
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:red; opacity:0.15; pointer-events:none;"></div>
        <div style="font-size:40px; color:#ff3333; text-align:center; margin-top:25vh; font-weight:bold; letter-spacing:4px;">
            SIGNAL LOST<br><br>
            <span style="font-size:20px; color:#aaa;">TAPE CORRUPTED // REWINDING...</span>
        </div>
    `;
    
    if(audioCtx) {
        let osc1 = audioCtx.createOscillator();
        let gain1 = audioCtx.createGain();
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc1.frequency.exponentialRampToValueAtTime(2800, audioCtx.currentTime + 0.4);
        
        let osc2 = audioCtx.createOscillator();
        let gain2 = audioCtx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(60, audioCtx.currentTime);
        osc2.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 1.2);

        gain1.gain.setValueAtTime(0.8, audioCtx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
        gain2.gain.setValueAtTime(1.0, audioCtx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
        
        osc1.connect(gain1); gain1.connect(audioCtx.destination);
        osc2.connect(gain2); gain2.connect(audioCtx.destination);
        
        osc1.start(); osc2.start();
        osc1.stop(audioCtx.currentTime + 1.5);
        osc2.stop(audioCtx.currentTime + 1.5);
    }
    
    setTimeout(() => location.reload(), 2500);
}

/**
 * MAIN GAME LOOP
 */
const clock = new THREE.Clock();
const playerRadius = 0.5;

function checkCollision(pos) {
    const pBox = new THREE.Box3(
        new THREE.Vector3(pos.x - playerRadius, 0, pos.z - playerRadius),
        new THREE.Vector3(pos.x + playerRadius, 3, pos.z + playerRadius)
    );
    for(let wall of walls) {
        if(pBox.intersectsBox(wall)) return true;
    }
    return false;
}

function update(delta) {
    GAME_STATE.time += delta;

    const mins = Math.floor(GAME_STATE.time / 60).toString().padStart(2, '0');
    const secs = Math.floor(GAME_STATE.time % 60).toString().padStart(2, '0');
    const ms = Math.floor((GAME_STATE.time % 1) * 100).toString().padStart(2, '0');
    document.getElementById('timecode').innerText = `${mins}:${secs}:${ms}`;

    camera.quaternion.slerp(new THREE.Quaternion().setFromEuler(lookEuler), Math.exp(-delta * 15));

    let keyboardMoving = (keys.w || keys.s || keys.a || keys.d);
    let joystickMoving = (moveVector.lengthSq() > 0.01);
    let isMoving = keyboardMoving || joystickMoving;

    let wantsToSprint = keys.shift || (joystickMoving && joystickRawIntensity > 0.75);
    let isSprinting = isMoving && wantsToSprint && GAME_STATE.stamina > 5;

    if (isSprinting) {
        GAME_STATE.stamina -= delta * 22.0; 
        if (GAME_STATE.stamina < 0) GAME_STATE.stamina = 0;
    } else {
        let recoveryRate = isMoving ? 7.0 : 18.0; 
        GAME_STATE.stamina += delta * recoveryRate;
        if (GAME_STATE.stamina > 100) GAME_STATE.stamina = 100;
    }
    document.getElementById('stamina-fill').style.width = `${GAME_STATE.stamina}%`;

    let baseSpeedSetting = isSprinting ? 5.2 : 2.8; 
    let speed = baseSpeedSetting * delta;
    let velocity = new THREE.Vector3();
    
    if(keys.w) velocity.z -= 1;
    if(keys.s) velocity.z += 1;
    if(keys.a) velocity.x -= 1;
    if(keys.d) velocity.x += 1;

    if(velocity.lengthSq() > 0) {
        velocity.normalize().multiplyScalar(speed);
    } else if (joystickMoving) {
        velocity.copy(moveVector).multiplyScalar(speed);
    }

    velocity.applyEuler(new THREE.Euler(0, lookEuler.y, 0));

    let newPos = camContainer.position.clone().add(velocity);
    if(!checkCollision(new THREE.Vector3(newPos.x, camContainer.position.y, camContainer.position.z))) {
        camContainer.position.x = newPos.x;
    }
    if(!checkCollision(new THREE.Vector3(camContainer.position.x, camContainer.position.y, newPos.z))) {
        camContainer.position.z = newPos.z;
    }

    if(velocity.lengthSq() > 0.0001) {
        let bobFreq = isSprinting ? 16 : 10;
        let bobAmp = isSprinting ? 0.12 : 0.06;
        camera.position.y = Math.sin(GAME_STATE.time * bobFreq) * bobAmp;
    } else {
        camera.position.y = THREE.MathUtils.lerp(camera.position.y, 0, 0.1);
    }

    scene.traverse(child => {
        if(child.isPointLight && child.userData.flicker) {
            child.intensity = Math.random() > 0.8 ? 0 : 0.7;
        }
    });

    if(GAME_STATE.isFlashlightOn) {
        GAME_STATE.power -= delta * 0.3; 
        flashLight.intensity = (GAME_STATE.power / 100) * 3.5 + (Math.random() * 0.15);
        if(GAME_STATE.power <= 0) {
            GAME_STATE.isFlashlightOn = false;
            flashLight.intensity = 0;
            GAME_STATE.power = 0;
        }
    }
    document.getElementById('battery-ui').innerText = `PWR: ${Math.floor(GAME_STATE.power)}%`;

    const distToSmiler = camContainer.position.distanceTo(smiler.position);
    
    // REMOVED: Static Sniffer Wave drawing

    const dirToSmiler = new THREE.Vector3().subVectors(smiler.position, camContainer.position).normalize();
    const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    const dot = camDir.dot(dirToSmiler);
    const isLookingAtSmiler = dot > 0.8 && distToSmiler < 20;

    if (isLookingAtSmiler && GAME_STATE.isFlashlightOn) {
        smilerState.state = 'FREEZE';
    } else if (distToSmiler < 10 || (!GAME_STATE.isFlashlightOn && distToSmiler < 15)) {
        smilerState.state = 'CHARGE';
    } else {
        smilerState.state = 'STALK';
    }

    if (smilerState.state === 'STALK' || smilerState.state === 'CHARGE') {
        const moveSpeed = smilerState.state === 'CHARGE' ? 2.8 : 0.8; 
        smiler.position.add(dirToSmiler.multiplyScalar(-moveSpeed * delta));
        smiler.lookAt(camContainer.position); 
    }

    // REMOVED: Sanity depletion logic

    if (distToSmiler < 2.0) {
        GAME_STATE.health -= delta * 35.0; 
        document.getElementById('health-fill').style.backgroundColor = Math.sin(GAME_STATE.time * 25) > 0 ? '#ffffff' : '#ff3333';
    } else {
        document.getElementById('health-fill').style.backgroundColor = '#ff3333';
    }
    document.getElementById('health-fill').style.width = `${GAME_STATE.health}%`;

    // Static Shader settings (Jitter removed from shader, sanity removed from logic)
    let baseDistortion = 0.001;
    if (GAME_STATE.health < 50) baseDistortion += (50 - GAME_STATE.health) * 0.0005; // Slight color bleed worse at low health
    vhsMaterial.uniforms.distortionAmount.value = baseDistortion;
    vhsMaterial.uniforms.time.value = GAME_STATE.time;

    flashLight.target.updateMatrixWorld(); 

    if (GAME_STATE.health <= 0 && GAME_STATE.isRunning) {
        camera.lookAt(smiler.position); 
        triggerJumpscare();
    }
}

function animate() {
    requestAnimationFrame(animate);
    if (!GAME_STATE.isRunning) {
        if(vhsMaterial.uniforms.distortionAmount.value > 0.5) {
            vhsMaterial.uniforms.time.value += 0.1;
            renderer.render(quadScene, orthoCamera);
        }
        return;
    }

    const delta = clock.getDelta();
    update(delta);

    renderer.setRenderTarget(renderTarget);
    renderer.render(scene, camera);
    
    vhsMaterial.uniforms.tDiffuse.value = renderTarget.texture;
    
    renderer.setRenderTarget(null);
    renderer.render(quadScene, orthoCamera);
}

document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-screen').style.display = 'none';
    initAudio();
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    
    if (!('ontouchstart' in window || navigator.maxTouchPoints > 0)) {
        document.body.requestPointerLock();
    }
    
    GAME_STATE.isRunning = true;
    clock.start();
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderTarget.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms: Level 0 (Optimized)</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none; -webkit-user-select: none;
            touch-action: none; 
        }
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; color: #fff;
            text-shadow: 2px 2px 0 #000;
        }
        #camcorder-ui {
            position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold;
        }
        .blinking-rec { color: red; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        
        #battery-ui { position: absolute; top: 20px; right: 20px; font-size: 20px; }
        
        #hud-stats-container {
            position: absolute; bottom: 20px; right: 20px;
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 8px; font-size: 16px; font-weight: bold;
        }
        .bar-wrapper { display: flex; align-items: center; gap: 10px; }
        .meter-container {
            width: 150px; height: 10px; border: 1px solid #fff;
            background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 4px rgba(0,0,0,0.8);
        }
        .meter-fill { height: 100%; width: 100%; transition: width 0.05s linear; }
        #health-fill { background: #ff3333; box-shadow: 0 0 8px #ff0000; }
        #stamina-fill { background: #33ff33; box-shadow: 0 0 8px #00ff00; }
        
        #mobile-interface { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.4);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.6);
            transform: translate(-50%, -50%);
        }
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        button {
            padding: 15px 30px; font-size: 20px; font-family: 'Courier New', monospace;
            background: #222; color: #fff; border: 1px solid #fff; cursor: pointer;
            margin-top: 20px; pointer-events: auto;
        }
        button:hover { background: #444; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="start-screen">
        <h1>THE BACKROOMS</h1>
        <p>Desktop: WASD + Mouse to Look (Hold Shift to Sprint)</p>
        <p>Mobile: Left Joystick + Right Screen Drag</p>
        <p>Objective: Locate the glowing green EXIT door hidden in the corridors.</p>
        <button id="start-btn">ENTER LEVEL 0</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="camcorder-ui"><span class="blinking-rec">●</span> REC <span id="timecode">00:00:00</span></div>
        <div id="battery-ui">PWR: 100%</div>
        
        <div id="hud-stats-container">
            <div class="bar-wrapper">
                <span>VIT</span>
                <div class="meter-container"><div id="health-fill" class="meter-fill"></div></div>
            </div>
            <div class="bar-wrapper">
                <span>STM</span>
                <div class="meter-container"><div id="stamina-fill" class="meter-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="mobile-interface">
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
    </div>

<script>
/**
 * ARCHITECTURE & ENGINE SETUP
 */
const GAME_STATE = {
    isRunning: false,
    power: 100.0,
    health: 100.0,
    stamina: 100.0,
    isFlashlightOn: true,
    time: 0
};

let audioCtx;
const canvas = document.getElementById('gameCanvas');

// Performance Tuning: powerPreference & antialias parameters optimized
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Capped ratio for performance stability

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x161511, 0.06); 
renderer.setClearColor(scene.fog.color);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 45);
const camContainer = new THREE.Object3D();
camContainer.position.set(0, 1.6, 0);
scene.add(camContainer);
camContainer.add(camera);

const renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
const orthoCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const quadScene = new THREE.Scene();

/**
 * OPTIMIZED FOUND FOOTAGE SHADER
 */
const vhsMaterial = new THREE.ShaderMaterial({
    uniforms: {
        tDiffuse: { value: null },
        time: { value: 0.0 },
        distortionAmount: { value: 0.001 }
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float time;
        uniform float distortionAmount;
        varying vec2 vUv;

        float rand(vec2 co) {
            return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
        }

        void main() {
            vec2 uv = vUv;
            float r = texture2D(tDiffuse, vec2(uv.x + distortionAmount, uv.y)).r;
            vec2 gb = texture2D(tDiffuse, uv).gb;

            float scanline = sin(uv.y * 600.0) * 0.01;
            float noise = (rand(uv * time) - 0.5) * 0.02;

            vec3 color = vec3(r, gb.x, gb.y) - scanline + noise;
            gl_FragColor = vec4(color, 1.0);
        }
    `
});
const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), vhsMaterial);
quadScene.add(quad);

/**
 * HIGH-PERFORMANCE PROCEDURAL TEXTURES
 */
function createWallpaperTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#baa761'; ctx.fillRect(0, 0, 128, 128);
    ctx.strokeStyle = '#9e8c4f'; ctx.lineWidth = 2;
    for(let i = 0; i < 128; i += 32) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 128); ctx.stroke(); }
    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
    return texture;
}

function createCarpetTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#594e2e'; ctx.fillRect(0, 0, 64, 64);
    for(let i = 0; i < 400; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? '#423a20' : '#695c37';
        ctx.fillRect(Math.random()*64, Math.random()*64, 1, 1);
    }
    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
    texture.repeat.set(24, 24);
    return texture;
}

const wallTex = createWallpaperTexture();
const carpetTex = createCarpetTexture();

// Performance Optimization: Replaced MeshStandardMaterial with fast MeshLambertMaterial
const wallMat = new THREE.MeshLambertMaterial({ map: wallTex }); 
const floorMat = new THREE.MeshLambertMaterial({ map: carpetTex }); 
const ceilMat = new THREE.MeshLambertMaterial({ color: 0xbfb699 });
const lightFixtureMat = new THREE.MeshBasicMaterial({ color: 0xfffcdb });

const boxGeo = new THREE.BoxGeometry(4, 4, 4);
const lightFixtGeo = new THREE.BoxGeometry(1.2, 0.05, 0.3);

/**
 * LEVEL DESIGN CONFIGURATION
 */
const mazeSize = 40; 
const cellSize = 4;
const walls = [];

const ambientLight = new THREE.AmbientLight(0x22201b, 0.35);
scene.add(ambientLight);

const floorMega = new THREE.Mesh(new THREE.PlaneGeometry(mazeSize * cellSize, mazeSize * cellSize), floorMat);
floorMega.rotation.x = -Math.PI / 2;
floorMega.position.set(-cellSize/2, 0, -cellSize/2);
scene.add(floorMega);

const ceilMega = new THREE.Mesh(new THREE.PlaneGeometry(mazeSize * cellSize, mazeSize * cellSize), ceilMat);
ceilMega.rotation.x = Math.PI / 2;
ceilMega.position.set(-cellSize/2, 4, -cellSize/2);
scene.add(ceilMega);

const exitCell = { x: 15, z: 15 };

for(let x = -mazeSize/2; x < mazeSize/2; x++) {
    for(let z = -mazeSize/2; z < mazeSize/2; z++) {
        let isNearPlayer = (Math.abs(x) <= 2 && Math.abs(z) <= 2);
        let isNearExit = (x === exitCell.x && z === exitCell.z);
        
        if (!isNearPlayer && !isNearExit && Math.random() < 0.25) {
            const wall = new THREE.Mesh(boxGeo, wallMat);
            wall.position.set(x * cellSize, 2, z * cellSize);
            scene.add(wall);
            walls.push(new THREE.Box3().setFromObject(wall));
        } else if (!isNearExit && Math.random() < 0.08) {
            // FIXED: Ceiling meshes and light sources are now strictly paired and aligned
            const fixture = new THREE.Mesh(lightFixtGeo, lightFixtureMat);
            fixture.position.set(x * cellSize, 3.96, z * cellSize);
            scene.add(fixture);

            const light = new THREE.PointLight(0xfff5cc, 0.85, 12);
            light.position.set(x * cellSize, 3.8, z * cellSize);
            light.userData.flicker = Math.random() < 0.12;
            scene.add(light);
        }
    }
}

/**
 * ESCAPE SIGN & EXIT CHAMBER
 */
const exitGroup = new THREE.Group();
exitGroup.position.set(exitCell.x * cellSize, 0, exitCell.z * cellSize);
scene.add(exitGroup);

const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(2.2, 3, 0.1), new THREE.MeshLambertMaterial({ color: 0x3b1111 }));
doorMesh.position.set(0, 1.5, -0.05);
exitGroup.add(doorMesh);

const signCanvas = document.createElement('canvas'); signCanvas.width = 64; signCanvas.height = 32;
const sctx = signCanvas.getContext('2d'); sctx.fillStyle = '#022409'; sctx.fillRect(0,0,64,32);
sctx.fillStyle = '#1fff40'; sctx.font = 'bold 14px Arial'; sctx.textAlign = 'center'; sctx.fillText('EXIT', 32, 22);

const signMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 0.15), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(signCanvas) }));
signMesh.position.set(0, 3.2, 0.1);
exitGroup.add(signMesh);

const exitLight = new THREE.PointLight(0x1fff40, 0.8, 6);
exitLight.position.set(0, 3.0, 0.3);
exitGroup.add(exitLight);

const escapeThresholdBox = new THREE.Box3(
    new THREE.Vector3((exitCell.x * cellSize) - 1.5, 0, (exitCell.z * cellSize) - 1.5),
    new THREE.Vector3((exitCell.x * cellSize) + 1.5, 4, (exitCell.z * cellSize) + 1.5)
);

/**
 * THE SMILER (ENTITY SYSTEM)
 */
const faceCanvas = document.createElement('canvas'); faceCanvas.width = 128; faceCanvas.height = 128;
const fCtx = faceCanvas.getContext('2d');
fCtx.fillStyle = '#000000'; fCtx.fillRect(0, 0, 128, 128);
fCtx.fillStyle = '#ffffff'; fCtx.beginPath(); fCtx.arc(40, 50, 6, 0, Math.PI * 2); fCtx.arc(88, 50, 6, 0, Math.PI * 2); fCtx.fill();
fCtx.strokeStyle = '#ffffff'; fCtx.lineWidth = 3; fCtx.beginPath(); fCtx.arc(64, 60, 35, 0.1 * Math.PI, 0.9 * Math.PI); fCtx.stroke();

const smilerMat = new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(faceCanvas), transparent: true, blending: THREE.AdditiveBlending }); 
const smiler = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 2.2), smilerMat);
smiler.position.set(12, 1.3, -12);
scene.add(smiler);

let smilerState = 'HIDDEN'; let smilerCooldown = 0;

/**
 * MOBILE & DESKTOP CONTROLS
 */
let moveVector = new THREE.Vector3();
let joystickRawIntensity = 0; 
let lookEuler = new THREE.Euler(0, 0, 0, 'YXZ');
let keys = { w: false, a: false, s: false, d: false, shift: false };

document.addEventListener('keydown', e => {
    let k = e.key.toLowerCase(); if(k in keys) keys[k] = true;
    if(e.key === 'Shift') keys.shift = true;
});
document.addEventListener('keyup', e => {
    let k = e.key.toLowerCase(); if(k in keys) keys[k] = false;
    if(e.key === 'Shift') keys.shift = false;
});

document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
document.addEventListener('mousemove', e => {
    if(document.pointerLockElement === document.body) {
        lookEuler.y -= e.movementX * 0.002; lookEuler.x -= e.movementY * 0.002;
        lookEuler.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, lookEuler.x));
    }
});

let joystickPointerId = null, lookPointerId = null, stickCenter = { x: 0, y: 0 }, lastLookX = 0, lastLookY = 0;
const knob = document.getElementById('joystick-knob'), joystickZone = document.getElementById('joystick-zone');

window.addEventListener('pointerdown', e => {
    if (!GAME_STATE.isRunning || e.target.tagName === 'BUTTON') return; 
    const rect = joystickZone.getBoundingClientRect();
    const jCenterX = rect.left + rect.width / 2, jCenterY = rect.top + rect.height / 2;
    const dist = Math.sqrt(Math.pow(e.clientX - jCenterX, 2) + Math.pow(e.clientY - jCenterY, 2));

    if (dist <= rect.width / 2 + 40 && joystickPointerId === null) {
        joystickPointerId = e.pointerId; stickCenter = { x: jCenterX, y: jCenterY }; handleJoystickCalculation(e);
    } else if (lookPointerId === null) {
        lookPointerId = e.pointerId; lastLookX = e.clientX; lastLookY = e.clientY;
    }
});
window.addEventListener('pointermove', e => {
    if (e.pointerId === joystickPointerId) handleJoystickCalculation(e);
    else if (e.pointerId === lookPointerId) {
        lookEuler.y -= (e.clientX - lastLookX) * 0.005; lookEuler.x -= (e.clientY - lastLookY) * 0.005;
        lookEuler.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, lookEuler.x));
        lastLookX = e.clientX; lastLookY = e.clientY;
    }
});
const clearPointerTracking = e => {
    if (e.pointerId === joystickPointerId) {
        joystickPointerId = null; knob.style.transform = `translate(-50%, -50%)`; moveVector.set(0, 0, 0); joystickRawIntensity = 0;
    } else if (e.pointerId === lookPointerId) lookPointerId = null;
};
window.addEventListener('pointerup', clearPointerTracking);
window.addEventListener('pointercancel', clearPointerTracking);

function handleJoystickCalculation(e) {
    let dx = e.clientX - stickCenter.x, dy = e.clientY - stickCenter.y;
    const dist = Math.sqrt(dx * dx + dy * dy), maxDist = 40, clampDist = Math.min(dist, maxDist), angle = Math.atan2(dy, dx);
    knob.style.transform = `translate(calc(-50% + ${Math.cos(angle) * clampDist}px), calc(-50% + ${Math.sin(angle) * clampDist}px))`;
    joystickRawIntensity = clampDist / maxDist;
    moveVector.set(Math.cos(angle) * joystickRawIntensity, 0, Math.sin(angle) * joystickRawIntensity);
}

const flashLight = new THREE.SpotLight(0xfffae6, 3.5, 30, Math.PI/4.5, 0.6, 1.2);
camera.add(flashLight, flashLight.target);
flashLight.target.position.set(0, 0, -1);

function initAudio() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

/**
 * GAME OVER TERMINATION LOGIC
 */
function triggerJumpscare() {
    GAME_STATE.isRunning = false; vhsMaterial.uniforms.distortionAmount.value = 0.5;
    document.getElementById('ui-layer').innerHTML = `
        <div style="font-size:32px; color:#ff3333; text-align:center; margin-top:40vh; font-weight:bold;">
            SIGNAL LOST<br><span style="font-size:16px; color:#888;">CONNECTION INTERRUPTED</span>
        </div>`;
    setTimeout(() => location.reload(), 2500);
}

function triggerEscape() {
    GAME_STATE.isRunning = false;
    document.getElementById('ui-layer').innerHTML = `
        <div style="font-size:32px; color:#1fff40; text-align:center; margin-top:40vh; font-weight:bold;">
            FEED TERMINATED<br><span style="font-size:16px; color:#eee;">SUCCESSFUL ESCAPE</span>
        </div>`;
    setTimeout(() => location.reload(), 4000);
}

/**
 * RUNTIME GAME LOOP
 */
const clock = new THREE.Clock();
const playerRadius = 0.4;

function checkCollision(pos) {
    const pBox = new THREE.Box3(
        new THREE.Vector3(pos.x - playerRadius, 0, pos.z - playerRadius),
        new THREE.Vector3(pos.x + playerRadius, 3, pos.z + playerRadius)
    );
    for(let i = 0; i < walls.length; i++) { if(pBox.intersectsBox(walls[i])) return true; }
    return false;
}

function update(delta) {
    GAME_STATE.time += delta;

    // HUD Text formatting updates
    const mins = Math.floor(GAME_STATE.time / 60).toString().padStart(2, '0');
    const secs = Math.floor(GAME_STATE.time % 60).toString().padStart(2, '0');
    document.getElementById('timecode').innerText = `${mins}:${secs}:${Math.floor((GAME_STATE.time % 1) * 100).toString().padStart(2, '0')}`;

    camera.quaternion.slerp(new THREE.Quaternion().setFromEuler(lookEuler), Math.exp(-delta * 12));

    let isMoving = (keys.w || keys.s || keys.a || keys.d) || (moveVector.lengthSq() > 0.01);
    let isSprinting = isMoving && (keys.shift || joystickRawIntensity > 0.8) && GAME_STATE.stamina > 5;
        
    const targetFov = isSprinting ? 82 : 70;
    camera.fov += (targetFov - camera.fov) * delta * 8;
    camera.updateProjectionMatrix();

    if (isSprinting) GAME_STATE.stamina = Math.max(0, GAME_STATE.stamina - delta * 25.0);
    else GAME_STATE.stamina = Math.min(100, GAME_STATE.stamina + delta * (isMoving ? 10.0 : 22.0));
    document.getElementById('stamina-fill').style.width = `${GAME_STATE.stamina}%`;

    let speed = (isSprinting ? 4.8 : 2.5) * delta;
    let velocity = new THREE.Vector3();
    
    if(keys.w) velocity.z -= 1; if(keys.s) velocity.z += 1;
    if(keys.a) velocity.x -= 1; if(keys.d) velocity.x += 1;

    if(velocity.lengthSq() > 0) velocity.normalize().multiplyScalar(speed);
    else if (moveVector.lengthSq() > 0.01) velocity.copy(moveVector).multiplyScalar(speed);

    velocity.applyEuler(new THREE.Euler(0, lookEuler.y, 0));

    let newPos = camContainer.position.clone().add(velocity);
    if(!checkCollision(new THREE.Vector3(newPos.x, camContainer.position.y, camContainer.position.z))) camContainer.position.x = newPos.x;
    if(!checkCollision(new THREE.Vector3(camContainer.position.x, camContainer.position.y, newPos.z))) camContainer.position.z = newPos.z;

    if(velocity.lengthSq() > 0.0001) {
        camera.position.y = Math.sin(GAME_STATE.time * (isSprinting ? 14 : 9)) * (isSprinting ? 0.12 : 0.05);
        camera.position.x = Math.cos(GAME_STATE.time * (isSprinting ? 7 : 4)) * 0.015;
    }

    // Performance Optimization: Reduced flickering loops
    if (Math.random() > 0.95) {
        scene.traverse(child => {
            if(child.isPointLight && child.userData.flicker) child.intensity = Math.random() > 0.8 ? 0 : 0.85;
        });
    }

    if(GAME_STATE.isFlashlightOn) {
        GAME_STATE.power = Math.max(0, GAME_STATE.power - delta * 0.15); 
        let flicker = 1;
        if (GAME_STATE.power < 25) flicker = Math.random() > 0.92 ? 0.15 : 1;
        flashLight.intensity = ((GAME_STATE.power / 100) * 3.5) * flicker;
    }
    document.getElementById('battery-ui').innerText = `PWR: ${Math.floor(GAME_STATE.power)}%`;

    // Victory Check
    if (escapeThresholdBox.containsPoint(camContainer.position)) { triggerEscape(); return; }

    // Smiler Logic & Rubberband Correction
    const distToSmiler = camContainer.position.distanceTo(smiler.position);
    if (distToSmiler > 32.0) {
        let ang = Math.random() * Math.PI * 2;
        smiler.position.set(camContainer.position.x + Math.cos(ang)*14, 1.3, camContainer.position.z + Math.sin(ang)*14);
    }

    const dirToSmiler = new THREE.Vector3().subVectors(smiler.position, camContainer.position).normalize();
    const dot = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).dot(dirToSmiler);
    
    if (dot > 0.8 && distToSmiler < 20 && GAME_STATE.isFlashlightOn) smilerState = 'FREEZE';
    else if (distToSmiler < 10) smilerState = 'CHARGE';
    else smilerState = 'STALK';

    if (smilerState !== 'FREEZE') {
        let mSpeed = smilerState === 'CHARGE' ? 2.6 : 0.7;
        smiler.position.add(dirToSmiler.multiplyScalar(-mSpeed * delta));
        smiler.lookAt(camContainer.position);
    }

    if (distToSmiler < 1.8) {
        GAME_STATE.health = Math.max(0, GAME_STATE.health - delta * 40.0);
    }
    document.getElementById('health-fill').style.width = `${GAME_STATE.health}%`;

    vhsMaterial.uniforms.distortionAmount.value = 0.001 + (100 - GAME_STATE.health) * 0.0002;
    vhsMaterial.uniforms.time.value = GAME_STATE.time;
    flashLight.target.updateMatrixWorld();

    if (GAME_STATE.health <= 0 && GAME_STATE.isRunning) triggerJumpscare();
}

function animate() {
    requestAnimationFrame(animate);
    if (!GAME_STATE.isRunning) return;

    update(clock.getDelta());
    
    renderer.setRenderTarget(renderTarget);
    renderer.render(scene, camera);
    vhsMaterial.uniforms.tDiffuse.value = renderTarget.texture;
    
    renderer.setRenderTarget(null);
    renderer.render(quadScene, orthoCamera);
}

document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-screen').style.display = 'none';
    initAudio();
    if (!('ontouchstart' in window || navigator.maxTouchPoints > 0)) document.body.requestPointerLock();
    GAME_STATE.isRunning = true;
    clock.start();
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight); renderTarget.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>

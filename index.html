<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Backrooms - True Horror Build</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transition: opacity 0.1s; background: radial-gradient(circle, transparent 20%, rgba(180, 0, 0, 0.8) 130%); opacity: 0; z-index: 5; }

        #blocker { position: absolute; width: 100%; height: 100%; background-color: rgba(15,15,5,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #eedd88; pointer-events: auto; z-index: 30; }
        #instructions { font-size: 18px; cursor: pointer; text-align: center; max-width: 600px; padding: 30px; border: 2px solid #b8a158; background: rgba(30,30,10,0.8); box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .glitch { font-size: 42px; color: #ccaa00; font-weight: bold; text-shadow: 2px 2px #ff0000, -2px -2px #0000ff; animation: glitch 1.2s infinite linear; letter-spacing: 4px; }
        
        #hud { position: absolute; top: 20px; left: 20px; color: #eedd88; font-size: 22px; text-shadow: 2px 2px 0 #000; display: none; z-index: 10; opacity: 0.8; }
        #rec { position: absolute; top: 20px; right: 30px; color: #ff3333; font-size: 22px; font-weight: bold; animation: blink 1s infinite; display: none; z-index: 10; }
        
        #jumpscare { display: none; position: absolute; width: 100%; height: 100%; z-index: 50; flex-direction: column; align-items: center; justify-content: center; background-color: #000; color: #fff; font-size: 90px; font-weight: bold; text-align: center; text-shadow: 5px 5px 0 #f00, -5px -5px 0 #00f; }

        /* Mobile Controls UI */
        #mobile-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; display: none; }
        #joystick-base { position: absolute; width: 110px; height: 110px; background: rgba(215, 202, 141, 0.15); border: 3px solid rgba(215, 202, 141, 0.4); border-radius: 50%; display: none; transform: translate(-50%, -50%); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 45px; height: 45px; background: rgba(215, 202, 141, 0.6); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 8px rgba(0,0,0,0.4); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes glitch { 
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(-1px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }
    </style>
</head>
<body>
    <div id="vignette"></div>
    <div id="jumpscare">LOST CONNECTION</div>
    
    <div id="mobile-ui">
        <div id="joystick-base"><div id="joystick-stick"></div></div>
    </div>

    <div id="ui-layer">
        <div id="hud">ZONE: <span id="level-text">0</span></div>
        <div id="rec">● AUX REC</div>
    </div>
    
    <div id="blocker">
        <div id="instructions">
            <p class="glitch">LEVEL 0</p>
            <p id="desktop-text">WASD = Move | Mouse = Look | SHIFT = Sprint</p>
            <p id="mobile-text" style="display: none;">Left Screen = Smooth Move & Sprint | Right Screen = Drag Look</p>
            <p style="color: #b8a158; font-weight: bold; margin-top: 25px;">[ INITIALIZE SENSOR FEED ]</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // --- 1. CORE SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa5995e); 
        scene.fog = new THREE.FogExp2(0xa5995e, 0.035); 

        const camera = new THREE.PerspectiveCamera(110, window.innerWidth / window.innerHeight, 0.1, 60);
        camera.position.y = 1.6;

        const renderer = new THREE.WebGLRenderer({ powerPreference: "high-performance", antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. AUDIO SYNTHESIZER ENGINE ---
        let audioCtx;
        let humOsc, humGain;
        let heartOsc, heartGain;
        let monsterDroneOsc, monsterDroneGain;
        let nextHeartbeatTime = 0;

        function initAudio() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Fluorescent Hum Sound
            humOsc = audioCtx.createOscillator();
            humOsc.type = 'sawtooth';
            humOsc.frequency.value = 60; 
            humGain = audioCtx.createGain();
            humGain.gain.value = 0.05; 
            const lowpass = audioCtx.createBiquadFilter();
            lowpass.type = 'lowpass';
            lowpass.frequency.value = 180;
            humOsc.connect(lowpass).connect(humGain).connect(audioCtx.destination);
            humOsc.start();

            // Monster Proximity Heartbeat/Thumper Engine
            heartGain = audioCtx.createGain();
            heartGain.gain.value = 0.0;
            heartGain.connect(audioCtx.destination);

            // Monster Detection Alarm Drone
            monsterDroneOsc = audioCtx.createOscillator();
            monsterDroneOsc.type = 'sawtooth';
            monsterDroneOsc.frequency.value = 45;
            monsterDroneGain = audioCtx.createGain();
            monsterDroneGain.gain.value = 0.0;
            
            const droneFilter = audioCtx.createBiquadFilter();
            droneFilter.type = 'lowpass';
            droneFilter.frequency.value = 120;
            
            monsterDroneOsc.connect(droneFilter).connect(monsterDroneGain).connect(audioCtx.destination);
            monsterDroneOsc.start();
        }

        function playHeartbeatSound(intensity) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(55, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.15);
            
            gain.gain.setValueAtTime(intensity * 0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playJumpscareSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
            
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(85, audioCtx.currentTime);
            osc2.frequency.linearRampToValueAtTime(140, audioCtx.currentTime + 0.8);
            
            gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.0);
            
            osc.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start(); osc2.start();
            osc.stop(audioCtx.currentTime + 2.0); osc2.stop(audioCtx.currentTime + 2.0);
        }

        // --- 3. CONTROLS SETUP ---
        let isPlaying = false;
        const blocker = document.getElementById('blocker');
        const hud = document.getElementById('hud');
        const rec = document.getElementById('rec');
        
        const controls = new PointerLockControls(camera, document.body);
        const moveState = { forward: false, backward: false, left: false, right: false, sprint: false };
        
        let moveTouchId = null;
        let lookTouchId = null;
        const moveVector = new THREE.Vector2(0, 0);
        let lastLookX = 0, lastLookY = 0;
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');

        if (isMobile) {
            document.getElementById('desktop-text').style.display = 'none';
            document.getElementById('mobile-text').style.display = 'block';
            document.getElementById('mobile-ui').style.display = 'block';

            const jBase = document.getElementById('joystick-base');
            const jStick = document.getElementById('joystick-stick');
            let jStartX = 0, jStartY = 0;

            document.addEventListener('touchstart', (e) => {
                if(!isPlaying || isDead) return;
                for(let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    if(touch.clientX < window.innerWidth / 2 && moveTouchId === null) {
                        moveTouchId = touch.identifier;
                        jStartX = touch.clientX; jStartY = touch.clientY;
                        jBase.style.left = jStartX + 'px';
                        jBase.style.top = jStartY + 'px';
                        jBase.style.display = 'block';
                        jStick.style.transform = `translate(-50%, -50%)`;
                    } else if(touch.clientX >= window.innerWidth / 2 && lookTouchId === null) {
                        lookTouchId = touch.identifier;
                        lastLookX = touch.clientX; lastLookY = touch.clientY;
                    }
                }
            }, {passive: false});

            document.addEventListener('touchmove', (e) => {
                if(!isPlaying || isDead) return;
                for(let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    
                    if(touch.identifier === moveTouchId) {
                        let dx = touch.clientX - jStartX;
                        let dy = touch.clientY - jStartY;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        const maxDist = 45; 
                        
                        if(dist > maxDist) {
                            dx = (dx / dist) * maxDist;
                            dy = (dy / dist) * maxDist;
                        }
                        
                        jStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                        
                        // Push out all the way to auto sprint
                        moveState.sprint = dist > 38;
                        
                        moveVector.x = dx / maxDist;
                        moveVector.y = dy / maxDist;
                        
                    } else if(touch.identifier === lookTouchId) {
                        const deltaX = touch.clientX - lastLookX;
                        const deltaY = touch.clientY - lastLookY;
                        lastLookX = touch.clientX; lastLookY = touch.clientY;

                        euler.setFromQuaternion(camera.quaternion);
                        euler.y -= deltaX * 0.004;
                        euler.x -= deltaY * 0.004;
                        euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x));
                        camera.quaternion.setFromEuler(euler);
                    }
                }
            }, {passive: false});

            document.addEventListener('touchend', (e) => {
                for(let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    if(touch.identifier === moveTouchId) {
                        moveTouchId = null;
                        jBase.style.display = 'none';
                        moveVector.set(0,0);
                        moveState.sprint = false;
                    } else if(touch.identifier === lookTouchId) {
                        lookTouchId = null;
                    }
                }
            });

            blocker.addEventListener('click', () => {
                initAudio();
                blocker.style.display = 'none';
                hud.style.display = 'block';
                rec.style.display = 'block';
                isPlaying = true;
            });

        } else {
            blocker.addEventListener('click', () => {
                initAudio();
                controls.lock();
            });

            controls.addEventListener('lock', () => {
                blocker.style.display = 'none';
                hud.style.display = 'block';
                rec.style.display = 'block';
                isPlaying = true;
                if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            });

            controls.addEventListener('unlock', () => {
                if(!isDead) blocker.style.display = 'flex';
                hud.style.display = 'none';
                rec.style.display = 'none';
                isPlaying = false;
            });

            document.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': moveState.forward = true; break;
                    case 'KeyA': moveState.left = true; break;
                    case 'KeyS': moveState.backward = true; break;
                    case 'KeyD': moveState.right = true; break;
                    case 'ShiftLeft': moveState.sprint = true; break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': moveState.forward = false; break;
                    case 'KeyA': moveState.left = false; break;
                    case 'KeyS': moveState.backward = false; break;
                    case 'KeyD': moveState.right = false; break;
                    case 'ShiftLeft': moveState.sprint = false; break;
                }
            });
        }

        // --- 4. GRAPHICS & MATTE WALLS GENERATION ---
        function createWallTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#cfb974'; ctx.fillRect(0, 0, 512, 512); 
            ctx.strokeStyle = '#b09b57'; ctx.lineWidth = 4;
            // Realistic vertical wallpaper lines
            for(let i = 0; i < 512; i += 32) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke();
            }
            // Tiny noise speckles for texture depth
            for(let i=0; i<8000; i++) { ctx.fillStyle = `rgba(90, 75, 20, ${Math.random() * 0.08})`; ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2); }
            const tex = new THREE.CanvasTexture(canvas); return tex;
        }

        function createCarpetTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#9e894b'; ctx.fillRect(0, 0, 256, 256);
            for(let i=0; i<40000; i++) { ctx.fillStyle = `rgba(60, 48, 15, ${Math.random() * 0.2})`; ctx.fillRect(Math.random()*256, Math.random()*256, 1, 1); }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(16, 16); return tex;
        }

        function createCeilingTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ccc293'; ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#999065'; ctx.lineWidth = 3; ctx.strokeRect(0, 0, 256, 256);
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(16, 16); return tex;
        }

        const wallMat = new THREE.MeshLambertMaterial({ map: createWallTexture() }); 
        const floorMat = new THREE.MeshLambertMaterial({ map: createCarpetTexture() }); 
        const ceilingMat = new THREE.MeshLambertMaterial({ map: createCeilingTexture() }); 

        // Enclosed Play Area
        const arenaSize = 75;
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(arenaSize, arenaSize), floorMat); floor.rotation.x = -Math.PI / 2; scene.add(floor);
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(arenaSize, arenaSize), ceilingMat); ceiling.rotation.x = Math.PI / 2; ceiling.position.y = 3.0; scene.add(ceiling);

        // --- 5. GRID MAZE GENERATION & BORDERS ---
        let mapSize = 20; 
        const wallSize = 3.5;
        let walls = [];
        let wallMesh; 
        
        const exitBlock = new THREE.Mesh(new THREE.BoxGeometry(wallSize, 3, wallSize), new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.15 }));
        const exitLight = new THREE.PointLight(0x33ff33, 1.5, 12); exitBlock.add(exitLight); scene.add(exitBlock);

        // Monster Asset
        const monster = new THREE.Mesh(new THREE.BoxGeometry(1.1, 2.6, 1.1), new THREE.MeshBasicMaterial({ color: 0x080808 })); scene.add(monster);

        let monsterTarget = new THREE.Vector3();
        let isChasing = false;
        const raycaster = new THREE.Raycaster();

        // Build Fluorescent Overhead Panels Mesh Instancing
        let lightMesh;
        const lightGeo = new THREE.PlaneGeometry(1.6, 0.8);
        const lightMat = new THREE.MeshBasicMaterial({ color: 0xfffee0 });

        function generateLevel() {
            walls = [];
            if (wallMesh) scene.remove(wallMesh);
            if (lightMesh) scene.remove(lightMesh);

            camera.position.set(0, 1.6, 0);

            const wallGeo = new THREE.BoxGeometry(wallSize, 3.0, wallSize);
            // Calculate instances including perimeter borders
            const totalInstances = (mapSize + 2) * (mapSize + 2) + (mapSize * mapSize);
            wallMesh = new THREE.InstancedMesh(wallGeo, wallMat, totalInstances);
            
            let lightPositions = [];
            let instanceId = 0;
            const dummy = new THREE.Object3D();

            const half = mapSize / 2;

            // 1. GENERATE UNBREAKABLE OUTER BORDER WALLS
            for (let x = -half - 1; x <= half + 1; x++) {
                for (let z = -half - 1; z <= half + 1; z++) {
                    if (x === -half - 1 || x === half + 1 || z === -half - 1 || z === half + 1) {
                        const wX = x * wallSize; const wZ = z * wallSize;
                        dummy.position.set(wX, 1.5, wZ); dummy.updateMatrix();
                        wallMesh.setMatrixAt(instanceId++, dummy.matrix);
                        walls.push({ minX: wX - wallSize/2, maxX: wX + wallSize/2, minZ: wZ - wallSize/2, maxZ: wZ + wallSize/2 });
                    }
                }
            }

            // 2. GENERATE INNER MAZE PROCEDURAL COLUMNS
            for(let x = -half; x < half; x++) {
                for(let z = -half; z < half; z++) {
                    if (Math.abs(x) < 2 && Math.abs(z) < 2) {
                        // Keep spawn clear but add light overhead
                        if((x + z) % 3 === 0) lightPositions.push(new THREE.Vector3(x*wallSize, 2.98, z*wallSize));
                        continue; 
                    }

                    // Higher density layout logic
                    if(Math.random() > 0.60) {
                        const wX = x * wallSize; const wZ = z * wallSize;
                        dummy.position.set(wX, 1.5, wZ); dummy.updateMatrix();
                        wallMesh.setMatrixAt(instanceId++, dummy.matrix);
                        walls.push({ minX: wX - wallSize/2, maxX: wX + wallSize/2, minZ: wZ - wallSize/2, maxZ: wZ + wallSize/2 });
                    } else {
                        // Light panels spawn safely inside open hallway spaces
                        if(Math.random() > 0.75) {
                            lightPositions.push(new THREE.Vector3(x * wallSize, 2.98, z * wallSize));
                        }
                    }
                }
            }
            wallMesh.count = instanceId; 
            scene.add(wallMesh);

            // Populate ceiling fixtures
            lightMesh = new THREE.InstancedMesh(lightGeo, lightMat, lightPositions.length);
            for(let i=0; i<lightPositions.length; i++) {
                dummy.position.copy(lightPositions[i]);
                dummy.rotation.x = Math.PI / 2; 
                dummy.updateMatrix();
                lightMesh.setMatrixAt(i, dummy.matrix);
            }
            scene.add(lightMesh);

            // Place exit far away inside boundaries
            exitBlock.position.set((Math.random() > 0.5 ? 1 : -1) * (half - 2) * wallSize, 1.5, (Math.random() > 0.5 ? 1 : -1) * (half - 2) * wallSize);
            monster.position.set(-exitBlock.position.x, 1.3, -exitBlock.position.z);
            monsterTarget.copy(monster.position);
            isChasing = false;
        }

        // --- 6. LIGHTING SYSTEM ---
        const ambientLight = new THREE.AmbientLight(0xfffdbd, 1.1); scene.add(ambientLight);
        const flashlight = new THREE.PointLight(0xfffebb, 0.7, 18); camera.add(flashlight); scene.add(camera);

        // --- 7. VHS SHADER WITH TUNED/LESS INTENSE GRAIN ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const VhsShader = {
            uniforms: { "tDiffuse": { value: null }, "time": { value: 0.0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform float time; varying vec2 vUv;
                void main() {
                    vec2 uv = vUv; vec2 center = vec2(0.5, 0.5); vec2 d = uv - center; 
                    if(length(d) == 0.0) d = vec2(0.001, 0.0);
                    float r = length(d); float power = 1.15; float bind = sqrt(0.5);
                    uv = center + normalize(d) * tan(r * power) * bind / tan(bind * power);
                    if(uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) { gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0); return; }
                    
                    float offset = 0.0025 + sin(uv.y * 8.0 + time) * 0.0015;
                    float rColor = texture2D(tDiffuse, uv + vec2(offset, 0.0)).r;
                    float gColor = texture2D(tDiffuse, uv).g;
                    float bColor = texture2D(tDiffuse, uv - vec2(offset, 0.0)).b;
                    
                    // TUNED DOWN GRAIN NOISE AMPLITUDE FROM 0.06 TO 0.018 (CLEANER GRAPHICS)
                    float noise = fract(sin(dot(uv + time, vec2(12.9898,78.233))) * 43758.5453) * 0.018;
                    gl_FragColor = vec4(vec3(rColor, gColor, bColor) - noise, 1.0);
                }
            `
        };
        const vhsPass = new ShaderPass(VhsShader); composer.addPass(vhsPass);

        // --- 8. RUNTIME & TICK LOGIC ---
        const clock = new THREE.Clock();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const playerRadius = 0.45; 
        let isDead = false;
        let flashInterval;

        generateLevel();

        function animate() {
            requestAnimationFrame(animate);
            if (isDead) { camera.lookAt(monster.position); composer.render(); return; }

            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();
            vhsPass.uniforms["time"].value += delta;

            // Authentic flickering fluorescent light simulation
            flashlight.intensity = Math.random() > 0.985 ? Math.random() * 0.4 + 0.2 : 0.7;
            if(humGain) humGain.gain.value = 0.04 + Math.random() * 0.02;

            if (isPlaying) {
                const speed = moveState.sprint ? 15.5 : 9.5;
                const damping = Math.max(0, 1.0 - 11.0 * delta);
                velocity.x *= damping; velocity.z *= damping;

                let forwardAmt = 0; let rightAmt = 0;
                
                if(isMobile) {
                    // FIXED INVERTED TOUCH DIRECTION CONTROL
                    forwardAmt = moveVector.y; 
                    rightAmt = moveVector.x;
                } else {
                    forwardAmt = Number(moveState.forward) - Number(moveState.backward);
                    rightAmt = Number(moveState.right) - Number(moveState.left);
                }

                direction.z = forwardAmt; direction.x = rightAmt;
                if (direction.lengthSq() > 0) direction.normalize();

                velocity.z -= direction.z * speed * delta;
                velocity.x -= direction.x * speed * delta;

                euler.setFromQuaternion(camera.quaternion);
                const moveVec = new THREE.Vector3(velocity.x * delta, 0, velocity.z * delta);
                moveVec.applyEuler(new THREE.Euler(0, euler.y, 0, 'YXZ'));

                // Axis Sliding Map Collision System
                let newX = camera.position.x - moveVec.x; let newZ = camera.position.z - moveVec.z;
                
                let colX = false;
                for(let w of walls) { if (newX + playerRadius > w.minX && newX - playerRadius < w.maxX && camera.position.z + playerRadius > w.minZ && camera.position.z - playerRadius < w.maxZ) { colX = true; break; } }
                if(!colX) camera.position.x = newX; else velocity.x = 0;

                let colZ = false;
                for(let w of walls) { if (camera.position.x + playerRadius > w.minX && camera.position.x - playerRadius < w.maxX && newZ + playerRadius > w.minZ && newZ - playerRadius < w.maxZ) { colZ = true; break; } }
                if(!colZ) camera.position.z = newZ; else velocity.z = 0;

                // --- MONSTER SOUNDS & AI ENGAGEMENT ---
                const distToPlayer = monster.position.distanceTo(camera.position);
                
                // Pulsing Proximity Audio Synthesizer Loop
                if (audioCtx && time > nextHeartbeatTime) {
                    let proximityScale = Math.max(0, 1.0 - (distToPlayer / 22));
                    if (proximityScale > 0) {
                        playHeartbeatSound(proximityScale);
                        // Beats quicken as distance decreases
                        nextHeartbeatTime = time + Math.max(0.2, (distToPlayer / 22) * 1.1);
                    } else {
                        nextHeartbeatTime = time + 1.2;
                    }
                }

                const vignette = document.getElementById('vignette');
                vignette.style.opacity = distToPlayer < 22 ? 1.0 - (distToPlayer / 22) : 0;

                const rayOrigin = new THREE.Vector3(monster.position.x, 1.5, monster.position.z);
                const dirToPlayer = new THREE.Vector3().subVectors(camera.position, rayOrigin).normalize();
                raycaster.set(rayOrigin, dirToPlayer);
                const intersects = raycaster.intersectObject(wallMesh);
                
                let canSeePlayer = !(intersects.length > 0 && intersects[0].distance < distToPlayer);

                if (canSeePlayer) {
                    monsterTarget.copy(camera.position); monsterTarget.y = 1.3; 
                    if (!isChasing) {
                        isChasing = true;
                        if(monsterDroneGain) monsterDroneGain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.1);
                    }
                } else {
                    if (isChasing && monster.position.distanceTo(monsterTarget) < 1.0) {
                        isChasing = false;
                        if(monsterDroneGain) monsterDroneGain.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.5);
                    }
                    if (!isChasing && (monster.position.distanceTo(monsterTarget) < 1.0 || Math.random() < 0.015)) {
                        monsterTarget.set(monster.position.x + (Math.random() - 0.5) * 16, 1.3, monster.position.z + (Math.random() - 0.5) * 16);
                    }
                }

                const moveDir = new THREE.Vector3().subVectors(monsterTarget, monster.position);
                moveDir.y = 0;
                if (moveDir.lengthSq() > 0) {
                    moveDir.normalize();
                    // Monster speed runs slower than basic player movement speed
                    monster.position.addScaledVector(moveDir, 6.8 * delta);
                    monster.lookAt(monsterTarget.x, monster.position.y, monsterTarget.z);
                }

                if (distToPlayer < 1.5) triggerJumpscare();
                if (camera.position.distanceTo(exitBlock.position) < 2.2) { generateLevel(); }
            }
            composer.render();
        }

        function triggerJumpscare() {
            isDead = true; isPlaying = false;
            if(monsterDroneGain) monsterDroneGain.gain.setValueAtTime(0, audioCtx.currentTime);
            if(!isMobile) controls.unlock();
            playJumpscareSound();
            camera.lookAt(monster.position);
            
            const jsDiv = document.getElementById('jumpscare');
            jsDiv.style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('rec').style.display = 'none';
            document.getElementById('vignette').style.opacity = 0;
            if(isMobile) document.getElementById('mobile-ui').style.display = 'none';
            
            let flashCount = 0;
            flashInterval = setInterval(() => {
                jsDiv.style.backgroundColor = flashCount % 2 === 0 ? '#de2929' : '#000000';
                jsDiv.style.color = flashCount % 2 === 0 ? '#000000' : '#ffffff';
                jsDiv.style.transform = `translate(${(Math.random()-0.5)*35}px, ${(Math.random()-0.5)*35}px)`;
                flashCount++;
            }, 35);
            
            setTimeout(() => {
                clearInterval(flashInterval);
                jsDiv.style.transform = 'translate(0,0)';
                isDead = false; 
                jsDiv.style.display = 'none';
                blocker.style.display = 'flex';
                if(isMobile) document.getElementById('mobile-ui').style.display = 'block';
                generateLevel();
            }, 2500);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
